<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In Required - Herit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF',
                        surface: '#F3F4F6',
                        border: '#E5E7EB',
                        text: {
                            main: '#111827',
                            muted: '#6B7280'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'floating': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="m-0 p-0 bg-white text-text-main antialiased selection:bg-primary selection:text-white flex flex-col min-h-screen relative overflow-hidden">

    <!-- Background Content (Blurred) -->
    <div class="absolute inset-0 z-0 select-none pointer-events-none opacity-40 blur-sm">
        <!-- Global Header -->
        <header class="sticky top-0 w-full bg-white/80 border-b border-border">
            <div class="max-w-[1200px] mx-auto px-6 h-16 flex items-center justify-between">
                <div class="flex items-center gap-8">
                    <div class="flex items-center gap-2 text-primary">
                        <i class="fa-solid fa-globe text-xl"></i>
                        <span class="text-xl font-bold tracking-tight">Herit</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-grow w-full pb-16 bg-surface">
            <div class="bg-white border-b border-border py-4">
                <div class="max-w-[1200px] mx-auto px-6 h-6"></div>
            </div>
            <div class="max-w-[1200px] mx-auto px-6 py-8">
                <div class="flex flex-col lg:flex-row gap-8">
                    <div class="w-full lg:w-[70%]">
                        <div class="bg-white rounded-xl border border-border p-8 mb-6 h-[600px]"></div>
                    </div>
                    <div class="w-full lg:w-[30%]">
                        <div class="bg-white rounded-xl border border-border p-6 h-[400px]"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Overlay -->
    <div id="modal_overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/40 backdrop-blur-sm p-4 sm:p-6" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        
        <!-- Modal Card -->
        <div class="bg-white w-full max-w-md rounded-[12px] shadow-floating flex flex-col overflow-hidden animate-in fade-in zoom-in duration-200">
            
            <div class="p-8 flex flex-col items-center text-center">
                <!-- Icon Header -->
                <div id="lock_header" class="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center mb-5 ring-8 ring-blue-50/50">
                    <i class="fa-solid fa-lock text-primary text-2xl"></i>
                </div>

                <!-- Messaging -->
                <div id="auth_messaging" class="mb-8">
                    <h2 id="modal-title" class="text-2xl font-bold text-gray-900 mb-2">Sign in required</h2>
                    <p class="text-sm text-text-muted leading-relaxed max-w-[280px] mx-auto">
                        To express interest in volunteer roles or submit proposals, you need to sign in with your Google account.
                    </p>
                </div>

                <!-- Actions -->
                <div class="w-full flex flex-col gap-3">
                    <button id="primary_action_google" class="w-full flex items-center justify-center gap-3 px-4 py-3 bg-primary text-white text-sm font-semibold rounded-lg hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all shadow-sm">
                        <i class="fa-brands fa-google text-lg"></i>
                        Sign in with Google
                    </button>
                    
                    <button id="secondary_dismiss_link" class="w-full px-4 py-3 text-sm font-medium text-gray-600 hover:text-gray-900 bg-white border border-border rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-200 transition-colors">
                        Continue browsing
                    </button>
                </div>
            </div>

            <!-- Footer Note -->
            <div class="bg-gray-50 px-8 py-4 border-t border-border text-center">
                <p class="text-xs text-text-muted">
                    Secure authentication via Google Workspace. <br>We do not post on your behalf.
                </p>
            </div>
        </div>
    </div>

</body>
</html>
