on:
  workflow_dispatch:
  pull_request:
  push:
    # Run when commits are pushed to mainline branch (main or master)
    # Set this to the mainline branch you are using
    branches:
      - main
      - master

# GitHub Actions workflow to deploy to Azure using azd
# To configure required secrets for connecting to Azure, simply run `azd pipeline config`

# Set up permissions for deploying with secretless Azure federated credentials
# https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure?tabs=azure-portal%2Clinux#set-up-azure-login-with-openid-connect-authentication
permissions:
  id-token: write
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/portal/package-lock.json
            frontend/staff/package-lock.json

      - name: Install portal dependencies
        run: npm ci
        working-directory: frontend/portal

      - name: Build portal
        run: npm run build
        working-directory: frontend/portal

      - name: Test portal
        run: npm test -- --run
        working-directory: frontend/portal

      - name: Install staff dependencies
        run: npm ci
        working-directory: frontend/staff

      - name: Build staff
        run: npm run build
        working-directory: frontend/staff

      - name: Test staff
        run: npm test -- --run
        working-directory: frontend/staff

  e2e:
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: 'HeritE2e!Passw0rd'
        ports:
          - 14330:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'HeritE2e!Passw0rd' -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 20s
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build API
        run: dotnet build src/Herit.Api

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/portal/package-lock.json

      - name: Install portal dependencies
        run: npm ci
        working-directory: frontend/portal

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend/portal

      - name: Run E2E suite
        run: npm run e2e
        working-directory: frontend/portal

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/portal/e2e/.report
            frontend/portal/e2e/.results
          retention-days: 7

  e2e-staff:
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: 'HeritE2e!Passw0rd'
        ports:
          - 14330:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'HeritE2e!Passw0rd' -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 20s
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build API
        run: dotnet build src/Herit.Api

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/portal/package-lock.json
            frontend/staff/package-lock.json

      # The staff suite serves the portal alongside the staff app for the
      # cross-app scenarios, so both frontends' dependencies are installed.
      - name: Install portal dependencies
        run: npm ci
        working-directory: frontend/portal

      - name: Install staff dependencies
        run: npm ci
        working-directory: frontend/staff

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend/staff

      - name: Run staff E2E suite
        run: npm run e2e
        working-directory: frontend/staff

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staff
          path: |
            frontend/staff/e2e/.report
            frontend/staff/e2e/.results
          retention-days: 7

  cd:
    runs-on: ubuntu-latest
    needs: [ci, e2e, e2e-staff]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in with Azure (Federated Credentials)
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Log in with Azure CLI
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in with Azure (Client Credentials)
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        run: |
          $info = $Env:AZURE_CREDENTIALS | ConvertFrom-Json -AsHashtable;
          Write-Host "::add-mask::$($info.clientSecret)"

          azd auth login `
            --client-id "$($info.clientId)" `
            --client-secret "$($info.clientSecret)" `
            --tenant-id "$($info.tenantId)"
        shell: pwsh
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Provision Infrastructure
        run: azd provision --no-prompt
        env:
          AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}
          ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
          ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_AUTHORITY: ${{ secrets.ENTRA_AUTHORITY }}
          ENTRA_TENANT: ${{ secrets.ENTRA_TENANT }}
          ENTRA_PORTAL_SPA_CLIENT_ID: ${{ secrets.ENTRA_PORTAL_SPA_CLIENT_ID }}
          ENTRA_STAFF_SPA_CLIENT_ID: ${{ secrets.ENTRA_STAFF_SPA_CLIENT_ID }}
          EMAIL_ACS_CONNECTION_STRING: ${{ secrets.EMAIL_ACS_CONNECTION_STRING }}
          EMAIL_SENDER_ADDRESS: ${{ secrets.EMAIL_SENDER_ADDRESS }}

      - name: Deploy Application
        run: azd deploy --no-prompt
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_REDIRECT_URI: ${{ secrets.VITE_REDIRECT_URI }}
          VITE_AZURE_AUTHORITY: ${{ secrets.VITE_AZURE_AUTHORITY }}
          VITE_AZURE_TENANT_NAME: ${{ secrets.VITE_AZURE_TENANT_NAME }}
          # Per-app SPA client ids + the shared API client id (azd maps these to
          # each SPA's VITE_AZURE_CLIENT_ID / VITE_AZURE_API_CLIENT_ID via azure.yaml).
          VITE_PORTAL_AZURE_CLIENT_ID: ${{ secrets.VITE_PORTAL_AZURE_CLIENT_ID }}
          VITE_STAFF_AZURE_CLIENT_ID: ${{ secrets.VITE_STAFF_AZURE_CLIENT_ID }}
          VITE_AZURE_API_CLIENT_ID: ${{ secrets.VITE_AZURE_API_CLIENT_ID }}
