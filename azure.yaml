# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: herit
metadata:
  template: herit@0.0.1
services:
  api:
    project: ./src/Herit.Api
    language: csharp
    host: appservice
  web:
    project: ./frontend/portal
    language: js
    host: appservice
    dist: dist
    env:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_REDIRECT_URI: ${VITE_REDIRECT_URI}
      # Portal SPA's OWN app registration client id.
      VITE_AZURE_CLIENT_ID: ${VITE_PORTAL_AZURE_CLIENT_ID}
      VITE_AZURE_TENANT_NAME: ${VITE_AZURE_TENANT_NAME}
      VITE_AZURE_AUTHORITY: ${VITE_AZURE_AUTHORITY}
      VITE_AZURE_API_CLIENT_ID: ${VITE_AZURE_API_CLIENT_ID}
  staff:
    project: ./frontend/staff
    language: js
    host: appservice
    dist: dist
    env:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      # Staff app's MSAL redirect URI is its OWN Azure URL, not the portal's.
      VITE_REDIRECT_URI: ${VITE_STAFF_REDIRECT_URI}
      # Staff SPA's OWN app registration client id.
      VITE_AZURE_CLIENT_ID: ${VITE_STAFF_AZURE_CLIENT_ID}
      VITE_AZURE_TENANT_NAME: ${VITE_AZURE_TENANT_NAME}
      VITE_AZURE_AUTHORITY: ${VITE_AZURE_AUTHORITY}
      VITE_AZURE_API_CLIENT_ID: ${VITE_AZURE_API_CLIENT_ID}
      VITE_PORTAL_URL: ${VITE_PORTAL_URL}